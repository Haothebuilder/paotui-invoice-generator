// ===== Pricing config (matches your published rate card) =====
const TAX_RATE = 0.09;
const VOL_DIVISOR = 5000;

const RATES = {
  air: {
    firstKg: 13.0,         // applies only when total weight < 5kg
    lightSubsequent: 8.8,  // kg 2 to <5 (when under 5kg threshold)
    standardKgRate: 8.8,   // 5–30kg: flat $8.80/kg for ALL kg
    heavyKgRate: 8.5,      // 31kg+: flat $8.50/kg for ALL kg
    standardThreshold: 5,
    heavyThreshold: 31,
  },
  sea_kg: {
    firstKg: 8.0,
    subsequentKg: 2.5,
  },
  sea_cbm: {
    tiers: [
      { upTo: 0.4, flat: 90.0 },
      { upTo: 1.0, flat: 138.0 },
      { upTo: 10.0, perCbm: 138.0 },
      { upTo: Infinity, perCbm: 136.0 },
    ],
  },
};

const SURCHARGES = {
  extraLong: 60,
  postal09: 35,
  returnFee: 5,
  insurancePct: 0.1,
};

// ===== Helpers =====
const num = (v) => {
  if (v === null || v === undefined || v === "") return 0;
  const n = parseFloat(String(v).replace(/[$,\s]/g, ""));
  return isNaN(n) ? 0 : n;
};
const fmt = (n) =>
  "$" +
  num(n).toLocaleString("en-SG", {
    minimumFractionDigits: 2,
    maximumFractionDigits: 2,
  });

function calcVolumetric(L, W, H) {
  const l = num(L),
    w = num(W),
    h = num(H);
  if (!l || !w || !h) return 0;
  return (l * w * h) / VOL_DIVISOR;
}

// CBM rounding rule: always round UP to 1 decimal place
// e.g. 1.01 → 1.1, 0.41 → 0.5, 5.02 → 5.1
function roundUpCbm(cbm) {
  const c = num(cbm);
  if (c <= 0) return 0;
  return Math.ceil(c * 10) / 10;
}

// Threshold at which sea-by-kg should switch to CBM (when shipping fee ≥ $90)
const SEA_KG_TO_CBM_THRESHOLD = 90;

// Returns { chargeable_kg, shipping, breakdown_text }
// Billing rule: take heavier of actual vs volumetric, then round UP to nearest whole kg.
function calcShipping(method, params) {
  const { actualKg, volKg, cbm } = params;
  if (method === "air") {
    const heavier = Math.max(num(actualKg), num(volKg));
    if (heavier <= 0) return { chargeable: 0, shipping: 0, breakdown: "" };
    const charge = Math.ceil(heavier);
    const roundNote = charge !== heavier ? ` (${heavier.toFixed(2)}kg rounded up)` : "";
    const r = RATES.air;
    // Tier 3: 31kg & above — flat $8.50/kg for all kg
    if (charge >= r.heavyThreshold) {
      return {
        chargeable: charge,
        shipping: charge * r.heavyKgRate,
        breakdown: `${charge}kg${roundNote} × $${r.heavyKgRate.toFixed(2)}/kg (31kg+ rate)`,
      };
    }
    // Tier 2: 5–30kg — flat $8.80/kg for all kg
    if (charge >= r.standardThreshold) {
      return {
        chargeable: charge,
        shipping: charge * r.standardKgRate,
        breakdown: `${charge}kg${roundNote} × $${r.standardKgRate.toFixed(2)}/kg`,
      };
    }
    // Tier 1: under 5kg — 1st kg $13 + each additional kg $8.80
    if (charge <= 1) {
      return {
        chargeable: charge,
        shipping: charge * r.firstKg,
        breakdown: `${charge}kg${roundNote} × $${r.firstKg.toFixed(2)}/kg (1st kg rate)`,
      };
    }
    const subsequentKg = charge - 1;
    const shipping = r.firstKg + subsequentKg * r.lightSubsequent;
    return {
      chargeable: charge,
      shipping,
      breakdown: `1st kg $${r.firstKg.toFixed(2)} + ${subsequentKg}kg${roundNote} × $${r.lightSubsequent.toFixed(2)}/kg`,
    };
  }
  if (method === "sea_kg") {
    const heavier = Math.max(num(actualKg), num(volKg));
    if (heavier <= 0) return { chargeable: 0, shipping: 0, breakdown: "" };
    const charge = Math.ceil(heavier);
    const roundNote = charge !== heavier ? ` (${heavier.toFixed(2)}kg rounded up)` : "";
    const r = RATES.sea_kg;
    const subsequentKg = Math.max(0, charge - 1);
    const shipping = r.firstKg + subsequentKg * r.subsequentKg;
    return {
      chargeable: charge,
      shipping,
      breakdown:
        charge >= 1
          ? `1st kg $${r.firstKg.toFixed(2)} + ${subsequentKg}kg${roundNote} × $${r.subsequentKg.toFixed(2)}/kg`
          : `${charge}kg${roundNote} × $${r.firstKg.toFixed(2)}/kg`,
    };
  }
  if (method === "sea_cbm") {
    const cRaw = num(cbm);
    if (cRaw <= 0) return { chargeable: 0, shipping: 0, breakdown: "" };
    const c = roundUpCbm(cRaw); // always round up to 1 decimal
    const wasRounded = c !== cRaw;
    const roundNote = wasRounded ? ` (${cRaw.toFixed(2)} rounded up)` : "";
    if (c <= 0.4) {
      return {
        chargeable: c,
        shipping: 90,
        breakdown: `${c.toFixed(1)} cbm${roundNote} (0–0.4 cbm flat $90.00)`,
      };
    }
    if (c <= 1.0) {
      return {
        chargeable: c,
        shipping: 138,
        breakdown: `${c.toFixed(1)} cbm${roundNote} (0.41–1.0 cbm flat $138.00)`,
      };
    }
    if (c <= 10.0) {
      return {
        chargeable: c,
        shipping: c * 138,
        breakdown: `${c.toFixed(1)} cbm${roundNote} × $138.00/cbm`,
      };
    }
    return {
      chargeable: c,
      shipping: c * 136,
      breakdown: `${c.toFixed(1)} cbm${roundNote} × $136.00/cbm`,
    };
  }
  return { chargeable: 0, shipping: 0, breakdown: "" };
}

// ===== CSV/TSV parse for lookup =====
function parseTabular(text) {
  const firstLine = text.split(/\r?\n/, 1)[0] || "";
  const tabCount = (firstLine.match(/\t/g) || []).length;
  const commaCount = (firstLine.match(/,/g) || []).length;
  const delim = tabCount > commaCount ? "\t" : ",";
  const rows = [];
  let cur = [""];
  let i = 0,
    inQuotes = false;
  while (i < text.length) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"' && text[i + 1] === '"') {
        cur[cur.length - 1] += '"';
        i += 2;
        continue;
      }
      if (c === '"') {
        inQuotes = false;
        i++;
        continue;
      }
      cur[cur.length - 1] += c;
      i++;
    } else {
      if (c === '"' && delim === ",") {
        inQuotes = true;
        i++;
        continue;
      }
      if (c === delim) {
        cur.push("");
        i++;
        continue;
      }
      if (c === "\n" || c === "\r") {
        if (c === "\r" && text[i + 1] === "\n") i++;
        rows.push(cur);
        cur = [""];
        i++;
        continue;
      }
      cur[cur.length - 1] += c;
      i++;
    }
  }
  if (cur.length > 1 || cur[0] !== "") rows.push(cur);
  return rows;
}

function rowsToInvoices(rows) {
  if (!rows.length) return [];
  let headerIdx = rows.findIndex(
    (r) =>
      r.some((c) => /invoice/i.test(c)) && r.some((c) => /customer/i.test(c))
  );
  if (headerIdx < 0) headerIdx = 0;
  const header = rows[headerIdx].map((h) => h.trim());
  const idx = (name) =>
    header.findIndex((h) => h.toLowerCase().includes(name.toLowerCase()));
  const map = {
    date: idx("date"),
    inv: idx("invoice"),
    disc: idx("disc"),
    customer: idx("customer"),
    contact: idx("contact"),
    address: idx("address"),
    type: idx("type"),
    method: idx("method"),
    parcel: idx("parcel"),
    tracking: idx("tracking"),
    revenue: idx("revenue"),
  };
  const out = [];
  for (let i = headerIdx + 1; i < rows.length; i++) {
    const r = rows[i];
    const get = (k) => (map[k] >= 0 ? (r[map[k]] || "").trim() : "");
    const inv = get("inv");
    const cust = get("customer");
    if (!inv && !cust) continue;
    out.push({
      date: get("date"),
      invoiceNo: inv,
      discPct: get("disc"),
      customer: cust,
      contact: get("contact"),
      address: get("address"),
      typeOfGoods: get("type"),
      methodLabel: get("method"),
      parcelNo: get("parcel"),
      trackingNo: get("tracking"),
      revenue: get("revenue"),
      _historic: true, // means we don't have full breakdown
    });
  }
  return out;
}

function suggestNext(invoices, prefix) {
  const matching = invoices
    .map((i) => i.invoiceNo)
    .filter((n) => /^\d+$/.test(n) && n.startsWith(prefix))
    .map((n) => parseInt(n, 10))
    .filter((n) => !isNaN(n));
  if (matching.length === 0) return prefix === "4" ? "48000" : "78000";
  return String(Math.max(...matching) + 1);
}

// Split pasted TSV text into logical rows, respecting quoted cells that may contain newlines.
// Google Sheets wraps any cell containing newlines or tabs in double quotes when copied.
function splitRowsRespectingQuotes(text) {
  const rows = [];
  let cur = "";
  let inQuotes = false;
  let i = 0;
  while (i < text.length) {
    const c = text[i];
    if (c === '"') {
      // Toggle quotes; "" inside quotes is an escaped quote
      if (inQuotes && text[i + 1] === '"') {
        cur += '""';
        i += 2;
        continue;
      }
      inQuotes = !inQuotes;
      cur += c;
      i++;
      continue;
    }
    if ((c === "\n" || c === "\r") && !inQuotes) {
      if (c === "\r" && text[i + 1] === "\n") i++;
      if (cur.trim().length > 0) rows.push(cur);
      cur = "";
      i++;
      continue;
    }
    cur += c;
    i++;
  }
  if (cur.trim().length > 0) rows.push(cur);
  return rows;
}

// Split a single row into TSV columns, respecting quoted cells.
function splitColumnsRespectingQuotes(row) {
  const cols = [];
  let cur = "";
  let inQuotes = false;
  let i = 0;
  while (i < row.length) {
    const c = row[i];
    if (c === '"') {
      if (inQuotes && row[i + 1] === '"') {
        cur += '"';
        i += 2;
        continue;
      }
      inQuotes = !inQuotes;
      i++;
      continue;
    }
    if (c === "\t" && !inQuotes) {
      cols.push(cur);
      cur = "";
      i++;
      continue;
    }
    cur += c;
    i++;
  }
  cols.push(cur);
  return cols.map((c) => c.trim());
}

// Parse a single TSV/tab-pasted row from the Google Sheet and map it to invoice fields.
// Sheet column order:
// 0:Date 1:Invoice 2:Disc% 3:Customer 4:Contact 5:Address 6:TypeOfGoods 7:Method
// 8:Weight 9:Sea(cubic) 10:Actual.W 11:VolWeight 12:ChargeableVolWt
// 13:ValueOfGoods 14:ValueReported 15:ChargeableTax
// 16:ParcelNo 17:Tracking 18:Revenue 19:Cost 20:Profit ...
// 25:InsuranceY/N 26:Insurance ($, 10% of col 13)
function parseSingleRow(text) {
  // Use quote-aware column splitting so multi-line parcel cells stay intact
  const cols = splitColumnsRespectingQuotes(text);
  if (cols.length < 4) return null;
  const G = (i) => (cols[i] || "").trim();

  const methodRaw = G(7).toLowerCase();
  let method = "air";
  if (methodRaw.includes("cbm") || methodRaw.includes("lcl")) method = "sea_cbm";
  else if (methodRaw.includes("sea")) method = "sea_kg";
  else if (methodRaw.includes("air")) method = "air";
  // Fallback: infer from invoice number prefix
  if (!methodRaw) {
    const inv = G(1);
    if (inv.startsWith("4")) method = "sea_kg";
  }

  // Convert date format e.g. "26/4/26" -> "2026-04-26"
  let date = G(0);
  const m = date.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
  if (m) {
    let [, d, mo, y] = m;
    if (y.length === 2) y = "20" + y;
    date = `${y}-${mo.padStart(2, "0")}-${d.padStart(2, "0")}`;
  }

  return {
    date,
    invoiceNo: G(1),
    discPct: G(2).replace(/%/g, ""),
    customer: G(3),
    contact: G(4),
    address: G(5),
    typeOfGoods: G(6) || "Normal",
    method,
    declaredWeight: G(8),
    cbm: G(9),
    actualKg: G(10),
    volWeight: G(11),
    chargeableVol: G(12),
    valueOfGoods: G(13),
    valueReported: G(14),
    chargeableTax: G(15).replace(/[$,\s]/g, ""),
    parcelNo: G(16),
    trackingNo: G(17),
    revenue: G(18).replace(/[$,\s]/g, ""),
    insuranceOptIn: G(25),
    insuranceAmount: G(26).replace(/[$,\s]/g, ""),
  };
}

  .inv-terms-grid .item { display: flex; gap: 6px; }
  .inv-terms-grid .num-bullet { color: #1e3a8a; font-weight: 600; flex-shrink: 0; }
  .inv-foot { border-top: 1px solid #e0dccf; padding-top: 14px; font-size: 11px; color: #6b6b6b; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
  .inv-foot .thanks { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 17px; color: #1a1a1a; }

  @media print {
    body { background: #fff; }
    .pt-app, .pt-shell, .pt-tabs, .pt-card, .pt-modal-actions, .pt-toast, .pt-header { display: none !important; }
    .pt-modal-overlay { position: static; background: none; padding: 0; }
    .pt-modal { box-shadow: none; max-height: none; max-width: none; background: #fff; overflow: visible; }
    .pt-modal-close { display: none; }
    .invoice-doc { padding: 24px 28px; }
  }
`;

// ===== App =====
function PaoTuiInvoiceApp() {
  const [tab, setTab] = useState("new");
  const [csvText, setCsvText] = useState("");
  const [invoices, setInvoices] = useState([]);
  const [search, setSearch] = useState("");
  const [previewInv, setPreviewInv] = useState(null);
  const [toast, setToast] = useState("");

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(""), 2200);
  };

  const loadCSV = () => {
    if (!csvText.trim()) {
      showToast("Paste some data first");
      return;
    }
    try {
      const rows = parseTabular(csvText);
      const parsed = rowsToInvoices(rows);
      setInvoices(parsed);
      showToast(`Loaded ${parsed.length} invoice${parsed.length === 1 ? "" : "s"}`);
      if (parsed.length > 0) setTab("lookup");
    } catch (e) {
      showToast("Could not parse — check your data");
    }
  };

  const filtered = useMemo(() => {
    if (!search.trim()) return invoices.slice(0, 100);
    const q = search.toLowerCase();
    return invoices
      .filter(
        (inv) =>
          inv.invoiceNo.toLowerCase().includes(q) ||
          inv.customer.toLowerCase().includes(q) ||
          (inv.contact || "").toLowerCase().includes(q) ||
          (inv.trackingNo || "").toLowerCase().includes(q)
      )
      .slice(0, 100);
  }, [invoices, search]);

  return (
    <div className="pt-app">
      <style>{styles}</style>
      <div className="pt-shell">
        <header className="pt-header">
          <div className="pt-header-left">
            <img src={LOGO_DATA_URI} alt="PaoTui.sg" className="pt-logo-sm" />
            <div>
              <div className="pt-brand-text">Invoice Generator</div>
              <div className="pt-tag">UEN {COMPANY.uen}</div>
            </div>
          </div>
          <div className="pt-tag" style={{ textAlign: "right" }}>
            {invoices.length > 0 ? `${invoices.length} records` : "no data loaded"}
          </div>
        </header>

        <div className="pt-tabs">
          <button
            className={`pt-tab ${tab === "new" ? "active" : ""}`}
            onClick={() => setTab("new")}
          >
            <Plus size={14} /> Create new
          </button>
          <button
            className={`pt-tab ${tab === "lookup" ? "active" : ""}`}
            onClick={() => setTab("lookup")}
          >
            <Search size={14} /> Look up existing
          </button>
          <button
            className={`pt-tab ${tab === "data" ? "active" : ""}`}
            onClick={() => setTab("data")}
          >
            <Upload size={14} /> Load data
          </button>
        </div>

        {tab === "data" && (
          <DataTab
            csvText={csvText}
            setCsvText={setCsvText}
            onLoad={loadCSV}
            count={invoices.length}
          />
        )}
        {tab === "lookup" && (
          <LookupTab
            search={search}
            setSearch={setSearch}
            filtered={filtered}
            invoices={invoices}
            onPreview={setPreviewInv}
            goToData={() => setTab("data")}
          />
        )}
        {tab === "new" && (
          <NewInvoiceTab
            onPreview={setPreviewInv}
            invoices={invoices}
            showToast={showToast}
          />
        )}
      </div>

      {previewInv && (
        <InvoicePreview
          inv={previewInv}
          onClose={() => setPreviewInv(null)}
          showToast={showToast}
        />
      )}
      {toast && (
        <div className="pt-toast">
          <Check size={14} />
          {toast}
        </div>
      )}
    </div>
  );
}

function DataTab({ csvText, setCsvText, onLoad, count }) {
  return (
    <div className="pt-card">
      <span className="pt-section-label">Optional</span>
      <h2 className="pt-h2">Load existing invoices</h2>
      <p className="pt-help">
        Only needed if you want to look up past invoices or auto-suggest the next number. Paste rows from your Google Sheet (with header row).
      </p>
      <textarea
        className="pt-textarea"
        placeholder="Paste rows from your sheet (header row first, then data)…"

      <div className="pt-btn-row">
        <button className="pt-btn accent" onClick={onLoad}>
          <Upload size={14} /> Load data
        </button>
        {count > 0 && (
          <span style={{ fontSize: 13, color: "#6b6b6b", alignSelf: "center" }}>
            {count} invoices ready
          </span>

}

function LookupTab({ search, setSearch, filtered, invoices, onPreview, goToData }) {
  if (invoices.length === 0) {
    return (
      <div className="pt-card">
        <h2 className="pt-h2">No data loaded yet</h2>
        <p className="pt-help">
          Load your invoice rows from Google Sheets to look up past records.
        </p>
        <button className="pt-btn" onClick={goToData}>
          <Upload size={14} /> Go to Load data
        </button>
      </div>
    );
  }
  return (
    <div className="pt-card">
      <span className="pt-section-label">Search</span>
      <h2 className="pt-h2">Find an invoice</h2>
      <p className="pt-help">
        Search by invoice number, customer name, contact, or tracking number.
      </p>
      <div className="pt-search-wrap">
        <Search size={16} className="pt-search-icon" />
        <input
          className="pt-search"
          placeholder="48656, Wee Wen Bin, 88086893…"
          value={search}
          onChange={(e) => setSearch(e.target.value)}
        />
      </div>
      <div className="pt-results">
        {filtered.length === 0 ? (
          <div className="pt-empty">No matches</div>
        ) : (
          filtered.map((inv, idx) => (
            <div key={idx} className="pt-row" onClick={() => onPreview(inv)}>
              <span className="pt-inv">{inv.invoiceNo || "—"}</span>
              <span className="pt-cust">
                {inv.customer || <em style={{ color: "#999" }}>no name</em>}
                {inv.methodLabel && (
                  <span className="pt-tag" style={{ marginLeft: 8 }}>
                    {inv.methodLabel}
                  </span>
                )}
              </span>
              <span className="pt-amt">{fmt(inv.revenue)}</span>
              <span className="pt-date">{inv.date || "—"}</span>
            </div>
          ))
        )}
      </div>
      <div style={{ fontSize: 12, color: "#6b6b6b", marginTop: 12 }}>
        Showing {filtered.length} of {invoices.length} · click a row to preview & save PDF
      </div>
    </div>
  );
}

function NewInvoiceTab({ onPreview, invoices, showToast }) {
  const today = new Date().toISOString().slice(0, 10);
  const [method, setMethod] = useState("air"); // air | sea_kg | sea_cbm
  const [showOptional, setShowOptional] = useState(false);

  const [form, setForm] = useState({
    date: today,
    invoiceNo: "",
    customer: "",
    contact: "",
    address: "",
    actualKg: "",
    L: "",
    W: "",
    H: "",
    cbm: "",
    declaredValue: "",
    discPct: "",
    parcelNo: "",
    trackingNo: "",
    typeOfGoods: "Normal",
  });

  const [extras, setExtras] = useState({
    extraLong: false,
    postal09: false,
    insurance: false,
    custom: false,
  });
  const [customLabel, setCustomLabel] = useState("");
  const [customAmount, setCustomAmount] = useState("");

  // Auto-suggest invoice number based on method (Air = 7xxxx, Sea = 4xxxx)
  useEffect(() => {
    const prefix = method === "air" ? "7" : "4";
    const otherPrefix = method === "air" ? "4" : "7";
    if (!form.invoiceNo || form.invoiceNo.startsWith(otherPrefix)) {
      const next = suggestNext(invoices, prefix);
      setForm((f) => ({ ...f, invoiceNo: next }));
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [method, invoices]);

  const update = (k) => (e) => setForm({ ...form, [k]: e.target.value });

  const calc = useMemo(() => {
    const volKg = calcVolumetric(form.L, form.W, form.H);
    const ship = calcShipping(method, {
      actualKg: form.actualKg,
      volKg,
      cbm: form.cbm,
    });

    const tax = num(form.declaredValue) * TAX_RATE;
    const extraLong = extras.extraLong && method !== "sea_cbm" ? SURCHARGES.extraLong : 0;
    const postal09 = extras.postal09 ? SURCHARGES.postal09 : 0;
    const insurance = extras.insurance ? num(form.declaredValue) * SURCHARGES.insurancePct : 0;
    const custom = extras.custom ? num(customAmount) : 0;

    const subtotal = ship.shipping + tax + extraLong + postal09 + insurance + custom;
    const disc = num(form.discPct) / 100;
    const discAmt = subtotal * disc;
    const total = subtotal - discAmt;

    return {
      volKg,
      chargeable: ship.chargeable,
      shipping: ship.shipping,
      shippingBreakdown: ship.breakdown,
      tax,
      extraLong,
      postal09,
      insurance,
      custom,
      subtotal,
      discAmt,
      total,
    };
  }, [form, method, extras, customAmount]);

  const buildInvoice = () => {
    if (!form.customer.trim()) return showToast("Customer name required") || null;
    if (!form.invoiceNo.trim()) return showToast("Invoice number required") || null;
    if (!form.contact.trim()) return showToast("Contact required") || null;
    if (calc.total <= 0) return showToast("No charges added") || null;

    const items = [];
    if (calc.shipping > 0) {
      const methodLabel =
        method === "air" ? "Air Freight" :
        method === "sea_kg" ? "Sea Freight (by weight)" :
        "Sea Freight (LCL / CBM)";
      items.push({
        desc: methodLabel,
        meta: calc.shippingBreakdown +
          (method !== "sea_cbm" && calc.volKg > 0
            ? ` · vol wt ${calc.volKg.toFixed(2)}kg`
            : ""),
        amount: calc.shipping,
      });
    }
    if (calc.extraLong > 0) {
      items.push({
        desc: "Extra-long item surcharge",
        meta: "L ≥ 140cm or both L & W ≥ 70cm",
        amount: calc.extraLong,
      });
    }
    if (calc.postal09 > 0) {
      items.push({
        desc: "Restricted postal area (09xxxx) delivery",
        meta: "",
        amount: calc.postal09,
      });
    }
    if (calc.insurance > 0) {
      items.push({
        desc: "Insurance",
        meta: `10% of declared value $${num(form.declaredValue).toFixed(2)}`,
        amount: calc.insurance,
      });
    }
    if (calc.custom > 0 && customLabel.trim()) {
      items.push({ desc: customLabel, meta: "", amount: calc.custom });
    }
    if (calc.tax > 0) {
      items.push({
        desc: "Import tax (GST 9%)",
        meta: `9% of declared value $${num(form.declaredValue).toFixed(2)}`,
        amount: calc.tax,
      });
    }

    return {
      date: form.date,
      invoiceNo: form.invoiceNo,
      discPct: form.discPct,
      customer: form.customer,
      contact: form.contact,
      address: form.address,
      method,
      typeOfGoods: form.typeOfGoods,
      parcelNo: form.parcelNo,
      trackingNo: form.trackingNo,
      items,
      subtotal: calc.subtotal,
      discAmt: calc.discAmt,
      total: calc.total,
    };
  };

  const generate = () => {
    const inv = buildInvoice();
    if (inv) onPreview(inv);
  };

  const copyRowForSheet = () => {
    const inv = buildInvoice();
    if (!inv) return;
    const methodLabel =
      method === "air" ? "Air" : method === "sea_kg" ? "Sea" : "CBM";
    const row = [
      inv.date,
      inv.invoiceNo,
      inv.discPct,
      inv.customer,
      inv.contact,
      inv.address,
      inv.typeOfGoods,
      methodLabel,
      "", // weight
      method === "sea_cbm" ? form.cbm : "",
      form.actualKg,
      calc.volKg ? calc.volKg.toFixed(2) : "",
      calc.chargeable ? calc.chargeable.toFixed(3) : "",
      form.declaredValue,
      "",
      calc.tax ? calc.tax.toFixed(2) : "",
      inv.parcelNo,
      inv.trackingNo,
      inv.total.toFixed(2),
      "", "", "", "", "", "",
    ].map((v) => String(v ?? "").replace(/\t/g, " ").replace(/\n/g, " "));
    navigator.clipboard.writeText(row.join("\t"));
    showToast("Row copied — paste into your sheet");
  };

  const showVolumetric = method !== "sea_cbm";

  // Paste-row state (supports single OR multiple rows)
  const [pasteText, setPasteText] = useState("");
  const [pasteOpen, setPasteOpen] = useState(false);
  const [bulkInvoices, setBulkInvoices] = useState([]);

  // Build an invoice object from a parsed row.
  // - Line item amount = rate-card shipping (heavier of actual/volumetric, rounded up,
  //   multiplied by the per-kg rate). This is the PRE-DISCOUNT figure.
  // - Total = sheet's `revenue` (the client's final billed amount).
  // - Discount line absorbs the gap (subtotal − total). discPct from sheet is shown
  //   as the label; the dollar amount always reconciles to the sheet.
  const buildFromParsedRow = (r) => {
    // Tax sourcing:
    //   - Column P (ChargeableTax) holds the pre-computed tax amount the sheet
    //     already charged the client. Use it directly when present — no need
    //     to recompute from value × rate.
    //   - Fall back to column N (ValueOfGoods) × TAX_RATE only if column P is
    //     blank, so older rows without the tax column still work.
    //   - Column N (ValueOfGoods) is what we cite on the invoice as the
    //     "declared value" basis, since that's what tax is conceptually on.
    const declaredValue = num(r.valueOfGoods);
    const tax = num(r.chargeableTax) || declaredValue * TAX_RATE;
    const revenue = num(r.revenue);
    const discPct = num(r.discPct);

    const actual = num(r.actualKg);
    // "Volumetric weight" on Chris's invoices = the Chargeable column on the sheet
    // (warehouse uses a different ÷6000 calc internally, but billing uses ÷5000 / col 12).
    // Fall back to the raw vol weight only if the chargeable column is empty.
    const volForBilling = num(r.chargeableVol) || num(r.volWeight);
    const ship = calcShipping(r.method, {
      actualKg: actual,
      volKg: volForBilling,
      cbm: num(r.cbm),
    });
    const grossShipping = ship.shipping;

    const items = [];
    const methodLabel =
      r.method === "air" ? "Air Freight" :
      r.method === "sea_kg" ? "Sea Freight (by weight)" :
      "Sea Freight (LCL / CBM)";

    // Only mention "before discount" when the client is actually entitled to one.
    const rateNote = discPct > 0 ? " (per rate card, before discount)" : "";
    let weightMeta = "";
    if (r.method === "sea_cbm") {
      weightMeta = `${num(r.cbm).toFixed(2)} cbm · ${ship.breakdown}${rateNote}`;
    } else {
      // ship.chargeable is ceil(max(actual, volForBilling)) — the kg figure used for billing.
      // calcShipping inserts " (X.XXkg rounded up)" inside breakdown; pull it out so it
      // sits next to the Volumetric value instead of buried beside the rate.
      const ROUND_RE = / \(\d+(?:\.\d+)?kg rounded up\)/;
      const roundMatch = ship.breakdown.match(ROUND_RE);
      const volNote = roundMatch ? roundMatch[0] : "";
      const cleanedBreakdown = ship.breakdown.replace(ROUND_RE, "");
      weightMeta = `Actual ${actual.toFixed(2)}kg · Volumetric ${ship.chargeable}kg${volNote} · ${cleanedBreakdown}${rateNote}`;
    }
    items.push({
      desc: methodLabel,
      meta: weightMeta,
      amount: grossShipping > 0 ? grossShipping : 0,
    });
    if (tax > 0) {
      items.push({
        desc: "Import tax (GST 9%)",
        meta: declaredValue > 0
          ? `9% of declared value $${declaredValue.toFixed(2)}`
          : "",
        amount: tax,
      });
    }

    // Insurance line — only when the customer opted in (col Z = "Y") AND the
    // sheet recorded an amount (col AA > 0). Col S already includes insurance,
    // so we add it to subtotal too to keep the discount-bridge math correct.
    const insuranceAmt = num(r.insuranceAmount);
    const insuranceOptedIn =
      (r.insuranceOptIn || "").trim().toUpperCase() === "Y";
    if (insuranceOptedIn && insuranceAmt > 0) {
      const vog = num(r.valueOfGoods);
      const vogFmt = vog.toLocaleString("en-SG", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2,
      });
      items.push({
        desc: `Insurance (10% of declared value S$${vogFmt})`,
        meta: "",
        amount: insuranceAmt,
      });
    }

    const subtotal =
      grossShipping + tax + (insuranceOptedIn ? insuranceAmt : 0);
    const discAmt = subtotal - revenue > 0 ? subtotal - revenue : 0;

    return {
      date: r.date,
      invoiceNo: r.invoiceNo,
      discPct,
      customer: r.customer,
      contact: r.contact,
      address: r.address,
      method: r.method,
      typeOfGoods: r.typeOfGoods,
      parcelNo: r.parcelNo,
      trackingNo: r.trackingNo,
      items,
      subtotal,
      discAmt,
      total: revenue,
    };
  };

  const parsePastedRows = () => {
    if (!pasteText.trim()) {
      showToast("Paste rows first");
      return [];
    }
    // Use quote-aware row splitting so multi-line parcel cells don't break rows
    const lines = splitRowsRespectingQuotes(pasteText);
    const built = [];
    for (const line of lines) {
      // Skip header row if present
      if (/^date\s/i.test(line) || /^date\t/i.test(line)) continue;
      const r = parseSingleRow(line);
      if (r && r.customer && r.invoiceNo) {
        built.push(buildFromParsedRow(r));
      }
    }
    return built;
  };

  const generateFromPaste = () => {
    const built = parsePastedRows();
    if (built.length === 0) {
      showToast("No valid rows found");
      return;
    }
    if (built.length === 1) {
      // Single row — open preview directly
      onPreview(built[0]);
      setBulkInvoices([]);
    } else {
      // Multiple rows — show list to pick from / batch print
      setBulkInvoices(built);
      showToast(`Parsed ${built.length} invoices`);
    }
  };

  const fillFormFromPaste = () => {
    const lines = splitRowsRespectingQuotes(pasteText);
    if (lines.length === 0) {
      showToast("Paste a row first");
      return;
    }
    const r = parseSingleRow(lines[0]);
    if (!r || !r.customer) {
      showToast("Could not read the row — check format");
      return;
    }
    setMethod(r.method);
    setForm({
      date: r.date || today,
      invoiceNo: r.invoiceNo,
      customer: r.customer,
      contact: r.contact,
      address: r.address,
      actualKg: r.actualKg,
      L: "", W: "", H: "",
      cbm: r.cbm,
      declaredValue: r.valueReported || r.valueOfGoods || "",
      discPct: r.discPct,
      parcelNo: r.parcelNo,
      trackingNo: r.trackingNo,
      typeOfGoods: r.typeOfGoods || "Normal",
    });
    setPasteOpen(false);
    showToast("Form filled — review & generate");
  };

  const printAllBulk = () => {
    if (bulkInvoices.length === 0) return;
    onPreview({ __bulk: true, invoices: bulkInvoices });
  };

  return (
    <>
      <div className="pt-card" style={{ background: "#1a1a1a", color: "#f5f3ee", borderColor: "#1a1a1a" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", flexWrap: "wrap", gap: 8 }}>
          <div>
            <span className="pt-section-label" style={{ color: "#999", marginBottom: 4 }}>Quick mode</span>
            <div style={{ fontSize: 16, fontWeight: 500 }}>Paste rows from your Google Sheet</div>
            <div style={{ fontSize: 12, color: "#999", marginTop: 4 }}>
              One or many — generate invoices in bulk
            </div>
          </div>
          <button
            className="pt-btn"
            style={{ background: "#1e3a8a" }}
            onClick={() => setPasteOpen(!pasteOpen)}
            type="button"
          >
            {pasteOpen ? <ChevronUp size={14} /> : <ChevronDown size={14} />}
            {pasteOpen ? "Hide" : "Open"}
          </button>
        </div>
        {pasteOpen && (
          <div style={{ marginTop: 14 }}>
            <textarea
              className="pt-textarea"
              style={{ background: "#0f0f0f", color: "#f5f3ee", borderColor: "#333", minHeight: 160 }}
              placeholder={"Paste one or more rows from your sheet (each on a new line):\n\n26/4/26\t78912\t\tYow Shi Min\t84124465\tBlk 104C…\tNormal\tAir\t2\t\t1\t1.03\t1.236\t\t\t0\tYT7616…\t299354008\t$21.80…\n26/4/26\t48913\t\tWee Wen Bin\t98765432\tBlk 200…\tNormal\tSea\t…\t$120.60…"}
              value={pasteText}
              onChange={(e) => setPasteText(e.target.value)}
            />
            <div className="pt-btn-row">
              <button className="pt-btn accent" onClick={generateFromPaste}>
                <FileText size={14} /> Generate invoice(s)
              </button>
              <button className="pt-btn secondary" style={{ background: "transparent", color: "#f5f3ee", borderColor: "#666" }} onClick={fillFormFromPaste}>
                <ChevronDown size={14} /> Fill form (1st row)
              </button>
              {bulkInvoices.length > 0 && (
                <button className="pt-btn" style={{ background: "#1e3a8a" }} onClick={printAllBulk}>
                  <Printer size={14} /> Print all {bulkInvoices.length}
                </button>
              )}
            </div>
            <div style={{ fontSize: 11, color: "#999", marginTop: 10, lineHeight: 1.5 }}>
              Uses the <strong>Revenue</strong> column as the customer total. Cost and profit columns are ignored.
            </div>
          </div>
        )}
      </div>

      {bulkInvoices.length > 0 && (
        <div className="pt-card">
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
            <div>
              <span className="pt-section-label">Parsed</span>
              <h2 className="pt-h2" style={{ marginBottom: 0 }}>{bulkInvoices.length} invoices ready</h2>
            </div>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
              <button className="pt-btn accent" onClick={printAllBulk}>
                <Printer size={14} /> Preview & print all
              </button>
              <button className="pt-btn secondary" onClick={() => setBulkInvoices([])}>
                <X size={14} /> Clear
              </button>
            </div>
          </div>

function InvoicePreview({ inv, onClose, showToast }) {
  const printPDF = () => window.print();

  // Build a single-page A4 PDF blob from the LIVE .invoice-doc element.
  // Returns { blob, filename } so callers can either save() it or zip many.
  const buildPdfBlob = async (targetInvoiceNo = null) => {
    const html2canvas = window.html2canvas;
    const jsPDF = (window.jspdf && window.jspdf.jsPDF) || window.jsPDF;
    if (typeof html2canvas !== "function" || typeof jsPDF !== "function") {
      throw new Error("PDF library not ready");
    }
    const target = targetInvoiceNo
      ? document.querySelector(`[data-pdf-invoice="${targetInvoiceNo}"] .invoice-doc`)
      : document.querySelector(".invoice-doc");
    if (!target) throw new Error("Invoice element not found");

    // Give the DOM one paint tick before html2canvas reads layout.
    await new Promise((r) => requestAnimationFrame(() => r()));

    const canvas = await html2canvas(target, {
      scale: 2,
      useCORS: true,
      backgroundColor: "#ffffff",
      logging: false,
    });

    const pdf = new jsPDF({
      unit: "mm",
      format: "a4",
      orientation: "portrait",
      compress: true,
    });
    const pageW = pdf.internal.pageSize.getWidth();
    const pageH = pdf.internal.pageSize.getHeight();
    const margin = 8;
    const usableW = pageW - 2 * margin;
    const usableH = pageH - 2 * margin;
    const fit = Math.min(usableW / canvas.width, usableH / canvas.height);
    const renderW = canvas.width * fit;
    const renderH = canvas.height * fit;
    const x = (pageW - renderW) / 2;
    const y = (pageH - renderH) / 2;
    pdf.addImage(
      canvas.toDataURL("image/jpeg", 0.95),
      "JPEG",
      x,
      y,
      renderW,
      renderH
    );

    const idForName = targetInvoiceNo || (inv && inv.invoiceNo) || "";
    let customerName = "";
    if (targetInvoiceNo && inv && inv.__bulk && Array.isArray(inv.invoices)) {
      const match = inv.invoices.find(
        (i) => (i.invoiceNo || "") === targetInvoiceNo
      );
      if (match) customerName = match.customer || "";
    } else if (inv) {
      customerName = inv.customer || "";
    }
    // Strip filesystem-unsafe chars; collapse whitespace.
    const safeName = customerName
      .replace(/[\\/:*?"<>|]/g, "")
      .replace(/\s+/g, " ")
      .trim();
    const parts = ["Invoice Paotui"];
    if (safeName) parts.push(safeName);
    if (idForName) parts.push(idForName);
    const filename = `${parts.join(" ")}.pdf`;
    return { blob: pdf.output("blob"), filename };
  };

  // Single-PDF download (per-invoice button + single-invoice modal).
  const downloadPDF = async (targetInvoiceNo = null) => {
    showToast("Generating PDF…");
    try {
      const { blob, filename } = await buildPdfBlob(targetInvoiceNo);
      triggerDownload(blob, filename);
      showToast(`Saved ${filename}`);
    } catch (err) {
      // eslint-disable-next-line no-console
      console.error("PDF export failed:", err);
      showToast(`PDF failed: ${(err && err.message) || "unknown error — see console"}`);
    }
  };

  // Bulk download — fires N separate PDF downloads, one per invoice, in sequence.
  // The first time, Chrome will show "This site is attempting to download
  // multiple files. Allow / Block" near the address bar — click Allow and
  // every subsequent invoice will download automatically.
  const downloadAllPDFs = async () => {
    if (!inv || !inv.__bulk || !inv.invoices) {
      return downloadPDF();
    }
    const total = inv.invoices.length;
    try {
      for (let i = 0; i < total; i++) {
        const single = inv.invoices[i];
        const id = single.invoiceNo || `bulk-${i}`;
        showToast(`Saving ${i + 1} of ${total}…`);
        // eslint-disable-next-line no-await-in-loop
        const { blob, filename } = await buildPdfBlob(id);
        triggerDownload(blob, filename);
        // Small breather between saves so the browser's download manager
        // registers each file before the next anchor click fires.
        // eslint-disable-next-line no-await-in-loop
        await new Promise((r) => setTimeout(r, 350));
      }
      showToast(
        `Saved ${total} PDF${total === 1 ? "" : "s"} — if some are missing, click "Allow" on Chrome's multi-download prompt and re-run.`
      );
    } catch (err) {
      // eslint-disable-next-line no-console
      console.error("Bulk PDF export failed:", err);
      showToast(`Bulk export failed: ${(err && err.message) || "unknown error"}`);
    }
  };

  // Save a Blob with a given filename via a temporary anchor tag.
  const triggerDownload = (blob, filename) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    // Defer revocation so the browser has time to start the download.
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  // Bulk mode: multiple invoices in one preview
  if (inv && inv.__bulk) {
    return (
      <div className="pt-modal-overlay" onClick={onClose}>
        <div className="pt-modal" onClick={(e) => e.stopPropagation()}>
          <button className="pt-modal-close" onClick={onClose}>
            <X size={18} />
          </button>
          <div style={{ background: "#fff" }}>
            {inv.invoices.map((single, i) => (
              <div
                key={i}
                data-pdf-invoice={single.invoiceNo || `bulk-${i}`}
                style={{
                  pageBreakAfter: i < inv.invoices.length - 1 ? "always" : "auto",
                  breakAfter: i < inv.invoices.length - 1 ? "page" : "auto",
                  borderBottom: i < inv.invoices.length - 1 ? "2px dashed #c8c8c8" : "none",
                }}
              >
                <SingleInvoiceDoc inv={single} />
                <div
                  style={{
                    display: "flex",
                    justifyContent: "flex-end",
                    padding: "12px 22px 18px",
                    background: "#fafaf6",
                    borderTop: "1px solid #e8e3d5",
                  }}
                >
                  <button
                    className="pt-btn secondary"
                    onClick={() => downloadPDF(single.invoiceNo || `bulk-${i}`)}
                  >
                    <Download size={14} /> Download this PDF
                    {single.customer ? ` — ${single.customer}` : ""}
                  </button>
                </div>
              </div>
            ))}
          </div>
          <div className="pt-modal-actions">
            <button className="pt-btn accent" onClick={downloadAllPDFs}>
              <Download size={14} /> Download all ({inv.invoices.length} separate PDFs)
            </button>
            <button className="pt-btn secondary" onClick={printPDF}>
              <Printer size={14} /> Print
            </button>
            <button className="pt-btn secondary" onClick={onClose}>
              Close
            </button>
          </div>
        </div>
      </div>
    );
  }

  // Single invoice mode
  const copyAsText = () => {
    const lines = [
      `${COMPANY.name} — Invoice ${inv.invoiceNo}`,
      `Date: ${inv.date}`,
      `Customer: ${inv.customer}`,
      `Contact: ${inv.contact}`,
      inv.address ? `Address: ${inv.address}` : "",
      ``,
    ];
    if (inv.items) {
      inv.items.forEach((it) => lines.push(`${it.desc}  ${fmt(it.amount)}`));
      lines.push(`Total: ${fmt(inv.total)}`);
    } else {
      lines.push(`Total: ${fmt(inv.revenue)}`);
    }
    lines.push("", `PayNow UEN: ${COMPANY.uen}`, `Reference: ${inv.invoiceNo}`);
    navigator.clipboard.writeText(lines.filter(Boolean).join("\n"));
    showToast("Invoice text copied");
  };

  return (
    <div className="pt-modal-overlay" onClick={onClose}>
      <div className="pt-modal" onClick={(e) => e.stopPropagation()}>
        <button className="pt-modal-close" onClick={onClose}>
          <X size={18} />
        </button>
        <SingleInvoiceDoc inv={inv} />
        <div className="pt-modal-actions">
          <button className="pt-btn accent" onClick={() => downloadPDF()}>
            <Download size={14} /> Download PDF
          </button>
          <button className="pt-btn secondary" onClick={printPDF}>
            <Printer size={14} /> Print
          </button>
          <button className="pt-btn secondary" onClick={copyAsText}>
            <Copy size={14} /> Copy as text
          </button>
          <button className="pt-btn secondary" onClick={onClose}>
            Close
          </button>
        </div>
      </div>
    </div>
  );
}

function SingleInvoiceDoc({ inv }) {
  const isHistoric = !inv.items;
  const items = inv.items || [
    {
      desc: `${inv.methodLabel || "Shipping"} — ${inv.typeOfGoods || "Goods"}`,
      meta: "",
      amount: num(inv.revenue),
    },
  ];

  const subtotal = inv.subtotal != null ? inv.subtotal : items.reduce((s, i) => s + num(i.amount), 0);
  const discAmt = inv.discAmt != null ? inv.discAmt : (num(inv.discPct) / 100) * subtotal;
  const total = inv.total != null ? inv.total : subtotal - discAmt;

  return (
    <div className="invoice-doc">
      <div className="inv-head">
        <img src={LOGO_DATA_URI} alt="PaoTui.sg" className="inv-logo" />
        <div className="inv-meta">
          <div className="label">Invoice</div>
          <div className="num">№ {inv.invoiceNo || "—"}</div>
          <div className="date">{inv.date || "—"}</div>
        </div>
      </div>

      <div className="inv-billto">
        <div>
          <h4>Bill to</h4>
          <p className="name">{inv.customer || "—"}</p>
          {inv.contact && <p>{inv.contact}</p>}
          {inv.address && <p>{inv.address}</p>}
        </div>
        <div style={{ textAlign: "right" }}>
          <h4>From</h4>
          <p className="name">{COMPANY.name}</p>
          <p>UEN: {COMPANY.uen}</p>
        </div>
      </div>

      <table className="inv-table">
        <thead>
          <tr>
            <th>Description</th>
            <th className="r">Amount</th>
          </tr>
        </thead>
        <tbody>
          {items.map((it, i) => (
            <tr key={i}>
              <td>
                <div className="desc">{it.desc}</div>
                {it.meta && <div className="meta">{it.meta}</div>}
              </td>
              <td className="r">{fmt(it.amount)}</td>
            </tr>
          ))}
        </tbody>
      </table>

      <div className="inv-totals">
        <table>
          <tbody>
            {num(inv.discPct) > 0 && discAmt > 0 && (
              <>
                <tr>
                  <td className="l">Subtotal</td>
                  <td className="r">{fmt(subtotal)}</td>
                </tr>
                <tr>
                  <td className="l">Discount {inv.discPct}%</td>
                  <td className="r">− {fmt(discAmt)}</td>
                </tr>
              </>
            )}
            <tr className="grand">
              <td className="l">Total Due</td>
              <td className="r">{fmt(total)}</td>
            </tr>
          </tbody>
        </table>
      </div>

      <div className="inv-paynow">
        <div>
          <h4>PayNow</h4>
          <div className="recipient">{COMPANY.paynowName}</div>
        </div>
        <div style={{ textAlign: "right" }}>
          <div className="label">UEN</div>
          <div className="uen">{COMPANY.uen}</div>
        </div>
        <div style={{ textAlign: "center" }}>
          <img
            src={QR_DATA_URI}
            alt="PaoTui.SG QR"
            style={{ width: 84, height: 84, display: "block", border: "1px solid #e0dccf", borderRadius: 2, background: "#fff" }}
          />
          <div className="label" style={{ marginTop: 4 }}>Scan</div>
        </div>
      </div>
      <div className="inv-payref">
        Please use invoice no. <strong className="pt-mono">{inv.invoiceNo}</strong> as payment reference
      </div>


      <div className="inv-terms">
        <h4>Terms & Conditions</h4>
        <div className="inv-terms-grid">
          {TERMS.map((t, i) => (
            <div className="item" key={i}>
              <span className="num-bullet">{i + 1}.</span>
              <span>{t}</span>
            </div>
          ))}
        </div>
        <div
          style={{
            marginTop: 10,
            fontSize: 11,
            fontStyle: "italic",
            color: "#6b6b6b",
          }}
        >
          The above is a summary. Full terms & conditions are available on request.
        </div>
      </div>

      <div className="inv-foot">
        <div>
          <div className="thanks">Thank you for shipping with us.</div>
        </div>
        <div
          style={{
            textAlign: "right",
            fontFamily: "JetBrains Mono, monospace",
            fontSize: 10,
          }}
        >
          Generated {new Date().toLocaleString("en-SG")}
        </div>
      </div>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<PaoTuiInvoiceApp />);
</script>
</body>
</html>
